<!DOCTYPE html>
<html>
<head>
  <title>Онлайн радиостанция</title>
</head>
<body>
  <div>
    <h2>Сейчас играет:</h2>
    <div id="current-track"></div>
    <h2>Следующий трек:</h2>
    <div id="next-track"></div>
  </div>

  <script>
    // Массив треков
    var tracks = [
      'https://www.youtube.com/watch?v=HlZIpqnfMIY',
      'https://www.youtube.com/watch?v=VCGpuMYGdCo'
    ];

    var currentTrackIndex = 0;

    // Функция для попочередного проигрывания треков
    function playTracks() {
      var currentTrack = tracks[currentTrackIndex];
      var nextTrackIndex = (currentTrackIndex + 1) % tracks.length;
      var nextTrack = tracks[nextTrackIndex];

      document.getElementById('current-track').textContent = currentTrack;
      document.getElementById('next-track').textContent = nextTrack;

      // Здесь вы можете добавить код для проигрывания трека воспроизводящим устройством,
      // например, встроенным плеером YouTube или другим HTML5 аудио/видео плеером.
      // Используйте currentTrack и nextTrack для получения URL-адресов треков.

      // Переключение на следующий трек
      currentTrackIndex = nextTrackIndex;

      // Планируем следующее проигрывание через 5 секунд
      setTimeout(playTracks, 5000);
    }

    // Начинаем проигрывание треков
    playTracks();
  </script>
</body>
</html>
